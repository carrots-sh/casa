name: release

# Semver releases: vMAJOR.MINOR.PATCH. Run with the part to bump (default
# patch); the workflow computes the next tag from the latest existing one.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: which version part to bump
        type: choice
        options: [patch, minor, major]
        default: patch

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: compute next version
        id: tag
        run: |
          set -eu
          LATEST="$(git tag --list | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1 || true)"
          if [ -z "$LATEST" ]; then
            TAG="v0.1.0"
          else
            V="${LATEST#v}"
            MAJ="${V%%.*}"; REST="${V#*.}"; MIN="${REST%%.*}"; PAT="${REST#*.}"
            case "${{ inputs.bump }}" in
              major) TAG="v$((MAJ + 1)).0.0" ;;
              minor) TAG="v${MAJ}.$((MIN + 1)).0" ;;
              *)     TAG="v${MAJ}.${MIN}.$((PAT + 1))" ;;
            esac
          fi
          echo "next version: $TAG (bump: ${{ inputs.bump }}, from: ${LATEST:-none})"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: create and push tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.tag.outputs.tag }}"
          git push origin "${{ steps.tag.outputs.tag }}"

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.tag.outputs.tag }}

name: release

# Date-based versioning (Stripe-style): the version IS the release date.
# Tag layout vYYYY.MMDD.N — year . zero-padded month+day . same-day counter.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: compute date version
        id: tag
        run: |
          set -eu
          YEAR=$(date -u +%Y)
          MMDD=$(date -u +%m%d)
          BASE="v${YEAR}.${MMDD}"
          # Next same-day counter: max existing + 1, else 0.
          N=0
          for t in $(git tag --list "${BASE}.*"); do
            c=${t##*.}
            case "$c" in ''|*[!0-9]*) continue ;; esac
            [ "$c" -ge "$N" ] && N=$((c + 1))
          done
          TAG="${BASE}.${N}"
          echo "date version: $TAG"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: create and push tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.tag.outputs.tag }}"
          git push origin "${{ steps.tag.outputs.tag }}"

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.tag.outputs.tag }}
